<div class="dialog-container">
  <h3 mat-dialog-title class="dialog-title">Edit Song</h3>
  
  <mat-dialog-content class="dialog-content">
    <div class="upload-container">
      <form [formGroup]="songForm">
        <div class="content-section">
          <h2 class="section-title">Song Details</h2>
          
          <div class="input-group">
            <label for="title" class="input-label">Title *</label>
            <input id="title" type="text" class="input-field" 
                   [class.error]="songForm.get('title')?.invalid && songForm.get('title')?.touched"
                   formControlName="title" placeholder="Enter song title">
            <span class="error-message" *ngIf="songForm.get('title')?.touched && songForm.get('title')?.hasError('required')">Title is required</span>
            <span class="error-message" *ngIf="songForm.get('title')?.touched && songForm.get('title')?.hasError('minlength')">Title must be at least 2 characters</span>
          </div>

          <div class="input-group">
            <label for="artist" class="input-label">Artist *</label>
            <input id="artist" type="text" class="input-field" 
                   [class.error]="songForm.get('artist')?.invalid && songForm.get('artist')?.touched"
                   formControlName="artist" placeholder="Enter artist name">
            <span class="error-message" *ngIf="songForm.get('artist')?.touched && songForm.get('artist')?.hasError('required')">Artist Name is required</span>
          </div>
        </div>

        <div class="content-section">
          <h3 class="section-title">Media Files</h3>
          
          <div class="input-group">
            <label class="input-label">Audio File</label>
            <div class="file-upload-wrapper">
              <input type="file" id="songFile" accept="audio/*" (change)="onSongFileSelected($event)" class="file-input-hidden">
              <label for="songFile" class="file-upload-box" [class.has-file]="songFile" [class.error]="songFileError">
                <div class="file-upload-content">
                  <mat-icon class="file-icon">{{ songFile ? 'audio_file' : 'cloud_upload' }}</mat-icon>
                  <div class="file-info">
                    <span class="file-name">{{ songFile?.name || 'Choose audio File' }}</span>
                    <span class="file-hint">MP3, WAV, or other audio formats (max 50MB)</span>
                  </div>
                </div>
              </label>
              <button *ngIf="songFile" mat-icon-button class="clear-file-btn" (click)="clearSongFile()" type="button">
                <mat-icon>close</mat-icon>
              </button>
            </div>
            <span class="error-message" *ngIf="songFileError">{{ songFileError }}</span>
            
            <div *ngIf="audioPreviewUrl" class="preview-container">
              <div class="preview-header"><mat-icon>headphones</mat-icon><span>New Audio Preview</span></div>
              <audio controls class="audio-preview" [src]="audioPreviewUrl"></audio>
            </div>
            <div *ngIf="!audioPreviewUrl && data.song.songUrl" class="preview-container current-media">
              <div class="preview-header"><mat-icon>music_note</mat-icon><span>Current Audio</span></div>
              <audio controls class="audio-preview" [src]="data.song.songUrl"></audio>
            </div>
          </div>

          <div class="input-group">
            <label class="input-label">Cover Image</label>
            <div class="file-upload-wrapper">
              <input type="file" id="imageFile" accept="image/*" (change)="onImageFileSelected($event)" class="file-input-hidden">
              <label for="imageFile" class="file-upload-box" [class.has-file]="imageFile" [class.error]="imageFileError">
                <div class="file-upload-content">
                  <mat-icon class="file-icon">{{ imageFile ? 'image' : 'add_photo_alternate' }}</mat-icon>
                  <div class="file-info">
                    <span class="file-name">{{ imageFile?.name || 'Choose cover image' }}</span>
                    <span class="file-hint">JPG, PNG, or other image formats (max 5MB)</span>
                  </div>
                </div>
              </label>
              <button *ngIf="imageFile" mat-icon-button class="clear-file-btn" (click)="clearImageFile()" type="button">
                <mat-icon>close</mat-icon>
              </button>
            </div>
            <span class="error-message" *ngIf="imageFileError">{{ imageFileError }}</span>

            <div *ngIf="imagePreviewUrl" class="preview-container">
              <div class="preview-header"><mat-icon>photo_library</mat-icon><span>New Cover Image Preview</span></div>
              <div class="image-preview-wrapper"><img [src]="imagePreviewUrl" alt="Cover preview" class="image-preview"></div>
            </div>
            <div *ngIf="!imagePreviewUrl && data.song.imageUrl" class="preview-container current-media">
              <div class="preview-header"><mat-icon>image</mat-icon><span>Current Cover Image</span></div>
              <div class="image-preview-wrapper"><img [src]="data.song.imageUrl" alt="Current cover" class="image-preview"></div>
            </div>
          </div>
        </div>
      </form>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()">Cancel</button>
    <button mat-raised-button color="primary" (click)="onSave()" [disabled]="!isFormValid">Save</button>
  </mat-dialog-actions>
</div>
